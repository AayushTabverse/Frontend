<div class="tracking-page" *ngIf="!loading; else loadingTpl">
  <header class="tracking-header">
    <h1>Order #{{ order?.orderNumber }}</h1>
    <span class="status-badge" [attr.data-status]="order?.status">{{ order?.status }}</span>
  </header>

  <div class="status-timeline">
    <div class="step" *ngFor="let step of statusSteps" [class.completed]="isStepCompleted(step)" [class.active]="order?.status === step">
      <div class="step-dot"></div>
      <span class="step-label">{{ step }}</span>
    </div>
  </div>

  <div class="eta-section" *ngIf="order && order.status !== 'Completed' && order.status !== 'Served'">
    <p>⏱ Estimated time: <strong>{{ order.estimatedMinutes }} minutes</strong></p>
  </div>

  <div class="order-details" *ngIf="order">
    <h2>Order Items</h2>
    <div class="detail-item" *ngFor="let item of order.items">
      <span>{{ item.quantity }}x {{ item.itemName }}</span>
      <span>₹{{ item.totalPrice | number:'1.0-0' }}</span>
    </div>
    <div class="order-total">
      <span>Total</span>
      <strong>₹{{ order.totalAmount | number:'1.0-0' }}</strong>
    </div>
  </div>
</div>

<ng-template #loadingTpl>
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading order...</p>
  </div>
</ng-template>
