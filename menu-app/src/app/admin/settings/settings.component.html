<div class="admin-layout">
  <nav class="sidebar" [class.collapsed]="sidebarCollapsed">
    <button class="sidebar-toggle" (click)="sidebarCollapsed = !sidebarCollapsed">
      {{ sidebarCollapsed ? '☰' : '✕' }}
    </button>
    <div class="brand">🍽️ <span class="brand-text">Admin</span></div>
    <a routerLink="/admin/dashboard" routerLinkActive="active">📊 <span class="nav-text">Dashboard</span></a>
    <a routerLink="/admin/analytics" routerLinkActive="active">📈 <span class="nav-text">Analytics</span></a>
    <a routerLink="/admin/menu" routerLinkActive="active">📋 <span class="nav-text">Menu</span></a>
    <a routerLink="/admin/tables" routerLinkActive="active">🪑 <span class="nav-text">Tables</span></a>
    <a routerLink="/admin/staff" routerLinkActive="active">👥 <span class="nav-text">Staff</span></a>
    <a routerLink="/admin/settings" routerLinkActive="active">⚙️ <span class="nav-text">Settings</span></a>
    <a routerLink="/admin/bills" routerLinkActive="active">🧾 <span class="nav-text">Bills</span></a>
    <a routerLink="/waiter" routerLinkActive="active">🛎️ <span class="nav-text">Take Order</span></a>
    <button class="logout-btn" (click)="logout()">🚪 <span class="nav-text">Logout</span></button>
  </nav>

  <main class="content" [class.sidebar-collapsed]="sidebarCollapsed">
    <div class="page-header">
      <h1>⚙️ Business Settings</h1>
      <div class="header-actions">
        <button class="dark-mode-toggle" (click)="themeService.toggle()">
          {{ themeService.isDark() ? '☀️ Light' : '🌙 Dark' }}
        </button>
        <span class="welcome">Welcome, {{ userName }}</span>
      </div>
    </div>

    <div class="toast success" *ngIf="successMessage">✅ {{ successMessage }}</div>
    <div class="toast error" *ngIf="errorMessage">❌ {{ errorMessage }}</div>

    <div class="loading" *ngIf="loading">Loading settings...</div>

    <div class="settings-form" *ngIf="!loading">
      <!-- Basic Info -->
      <div class="form-section">
        <h2>Basic Information</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Restaurant Name</label>
            <input type="text" [(ngModel)]="settings.name" placeholder="My Restaurant" />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" [(ngModel)]="settings.phone" placeholder="+91-XXXXXXXXXX" />
          </div>
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" [(ngModel)]="settings.address" placeholder="123 Main St, City" />
        </div>
        <div class="form-group">
          <label>Logo URL</label>
          <input type="url" [(ngModel)]="settings.logoUrl" placeholder="https://example.com/logo.png" />
        </div>
        <div class="logo-preview" *ngIf="settings.logoUrl">
          <img [src]="settings.logoUrl" alt="Logo Preview" />
          <span>Logo Preview</span>
        </div>
      </div>

      <!-- Social Media -->
      <div class="form-section">
        <h2>Social Media & Links</h2>
        <div class="form-group">
          <label>📷 Instagram URL</label>
          <input type="url" [(ngModel)]="settings.instagramUrl" placeholder="https://instagram.com/yourrestaurant" />
        </div>
        <div class="form-group">
          <label>📘 Facebook URL</label>
          <input type="url" [(ngModel)]="settings.facebookUrl" placeholder="https://facebook.com/yourrestaurant" />
        </div>
        <div class="form-group">
          <label>🐦 Twitter URL</label>
          <input type="url" [(ngModel)]="settings.twitterUrl" placeholder="https://twitter.com/yourrestaurant" />
        </div>
        <div class="form-group">
          <label>🌐 Website URL</label>
          <input type="url" [(ngModel)]="settings.websiteUrl" placeholder="https://yourrestaurant.com" />
        </div>
        <div class="form-group">
          <label>📍 Google Maps URL</label>
          <input type="url" [(ngModel)]="settings.googleMapsUrl" placeholder="https://maps.google.com/..." />
        </div>
      </div>

      <button class="save-btn" (click)="save()" [disabled]="saving">
        {{ saving ? 'Saving...' : '💾 Save Settings' }}
      </button>
    </div>
  </main>
</div>
