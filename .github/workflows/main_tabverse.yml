# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Angular app to Azure Web App - tabverse

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        working-directory: ./menu-app
        run: npm ci

      - name: Build Angular app
        working-directory: ./menu-app
        run: npx ng build --configuration=production

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/public
          cp -r menu-app/dist/menu-app/browser/* deploy/public/
          cp server.js deploy/
          echo '{"name":"tabverse-frontend","version":"1.0.0","main":"server.js","scripts":{"start":"node server.js"},"dependencies":{"express":"^4.21.0"}}' > deploy/package.json
          cd deploy && npm install --production
          echo "=== Package contents ==="
          ls -la
          ls -la node_modules/ | head -5
          ls -la public/ | head -10

      - name: Create zip package
        run: |
          cd deploy
          zip -r ../release.zip . -x '*.git*'
          echo "Zip size: $(du -h ../release.zip | cut -f1)"
          echo "Files in zip:"
          zipinfo -1 ../release.zip | head -30

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8310048816E34B6BA826AF29E8540B56 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_372D5F842AE045719DEF209D46BC1CDA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F6EC3D2BBB524DE68D5C0D50AB7B42D5 }}

      - name: Configure App Service settings
        run: |
          az webapp config set --resource-group "TabVerse-RG" --name tabverse --startup-file "node server.js"
          az webapp config appsettings set --resource-group "TabVerse-RG" --name tabverse --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false WEBSITE_RUN_FROM_PACKAGE=0

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tabverse'
          slot-name: 'Production'
          package: release.zip
          type: zip
          startup-command: 'node server.js'
